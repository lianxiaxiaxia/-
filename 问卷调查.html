<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>问卷 · 生活习惯调查</title>
  <style>
    * { user-select: none; }
    body {
      background: #f5f5f5; color: #333;
      font-family: "Microsoft YaHei", "苹方", sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; padding: 16px; box-sizing: border-box;
      transition: background 0.6s, color 0.6s;
    }
    .container {
      width: 100%; max-width: 620px;
      background: #fff; border: 1px solid #ddd;
      padding: 24px 28px; border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transition: background 0.6s, border 0.6s, box-shadow 0.6s;
      position: relative; z-index: 2;
    }
    .messages {
      min-height: 320px; max-height: 460px;
      overflow-y: auto; margin-bottom: 20px; padding: 8px 6px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: #e9e9e9; border-radius: 8px; }
    .messages::-webkit-scrollbar-thumb { background: #bbb; border-radius: 8px; }
    .msg { margin-bottom: 18px; animation: fadeSlide 0.35s; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.q { text-align: left; }
    .msg.q .bubble {
      background: #f0f2f5; border-left: 3px solid #9e9e9e;
      color: #1e2a3a; display: inline-block; padding: 10px 16px;
      border-radius: 4px 16px 16px 4px; font-size: 14px; line-height: 1.55;
      max-width: 90%; font-weight: normal;
    }
    .msg.a { text-align: right; }
    .msg.a .bubble {
      background: #e9eef3; border: 1px solid #d4dee8;
      color: #1e4660; display: inline-block; padding: 10px 16px;
      border-radius: 16px 4px 4px 16px; font-size: 14px; max-width: 90%;
      text-align: left; font-weight: normal;
    }

    .force-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 8px;
    }
    .force-btn {
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      font-weight: normal;
      white-space: nowrap;
    }
    .force-btn-no {
      background: #fff;
      color: #2c3e4e;
      border: 1px solid #cfdfed;
    }
    .force-btn-no:hover { background: #f8fafd; border-color: #9fb7cc; }
    .force-btn-yes {
      background: #fff6f0;
      border: 1px solid #b00030;
      color: #a1222a;
      border-left: 4px solid #b00030;
    }
    .force-btn-yes:hover { background: #ffe8e0; }

    .choices { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .choice-btn {
      background: #fff; color: #2c3e4e; border: 1px solid #cfdfed;
      padding: 12px 16px; border-radius: 40px; font-size: 14px;
      cursor: pointer; transition: 0.12s; font-weight: normal;
    }
    .choice-btn:hover { background: #f8fafd; border-color: #9fb7cc; }
    .forced-btn {
      border-left: 4px solid #b00030; background: #fff6f0; color: #a1222a;
    }
    .restart-btn {
      display: none; width: 100%; margin-top: 20px;
      background: #fff; color: #7f8c8d; border: 1px solid #d0dbe8;
      padding: 12px; border-radius: 60px; cursor: pointer; font-size: 13px;
    }
    .restart-btn:hover { background: #faf0f0; color: #b42f4a; }
    .shake-heavy { animation: brutalShake 0.12s infinite; }
    @keyframes brutalShake {
      0% { transform: translate(0,0); } 25% { transform: translate(4px,-3px); }
      50% { transform: translate(-3px,2px); } 75% { transform: translate(2px,-2px); }
      100% { transform: translate(0,0); }
    }
    .red-glow { box-shadow: 0 0 18px rgba(180,0,30,0.5); border-color: #b00030 !important; }
  </style>
</head>
<body>
<div class="container" id="mainContainer">
  <div class="messages" id="messages"></div>
  <div class="choices" id="choices"></div>
  <button class="restart-btn" id="restartBtn">◈ 重新填答 ◈</button>
</div>

<script>
  const messagesDiv = document.getElementById('messages');
  const choicesDiv = document.getElementById('choices');
  const restartBtn = document.getElementById('restartBtn');
  const container = document.getElementById('mainContainer');

  let choiceLog = [];
  let refuseStreak = 0;
  let isAnimating = false;
  let forceRound = 0;

  const weirdChars = ['/', '\\', '|', '¦', '‖', '∣', '⌇', '⌯', '⌖', '⍭', '⍉', '⌂', '◌', '◦', '⌾', '⌻', '⎯', '⏤', '∼', '∿', '⌀', '⌔'];
  const sensitiveWords = ['身', '体', '敏', '感', '碰', '内', '裤', '穿', '胸', '腰', '腿', 'tian', 'peng'];

  function maskSensitive(text) {
    let res = '';
    for (let c of text) {
      res += c;
      if (sensitiveWords.includes(c) && Math.random() < 0.4) res += weirdChars[Math.floor(Math.random()*weirdChars.length)];
    }
    return res;
  }

  function makeNoise(text, intensity=1) {
    let res = '';
    for (let c of text) {
      res += c;
      if (sensitiveWords.includes(c) && Math.random() < 0.35) {
        for (let i=0; i<intensity; i++) {
          if (Math.random() < 0.3) res += weirdChars[Math.floor(Math.random()*weirdChars.length)];
        }
      }
    }
    return res;
  }

  function normalStyle() {
    document.body.style.background = '#f5f5f5';
    document.body.style.color = '#333';
    container.style.background = '#fff';
    container.style.border = '1px solid #ddd';
    container.style.boxShadow = '0 8px 24px rgba(0,0,0,0.08)';
    container.classList.remove('red-glow');
    document.body.classList.remove('shake-heavy');
  }

  function darkPunish() {
    document.body.style.background = '#050505';
    document.body.style.color = '#c0b9b0';
    container.style.background = '#0f0c0c';
    container.style.border = '1px solid #5a1e2c';
    container.style.boxShadow = '0 0 28px rgba(180,0,30,0.5)';
    container.classList.add('red-glow');
  }

  function addQ(t, delay=400) {
    return new Promise(resolve => {
      setTimeout(() => {
        const d = document.createElement('div');
        d.className = 'msg q';
        d.innerHTML = `<span class="bubble">${t}</span>`;
        messagesDiv.appendChild(d);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        resolve();
      }, delay);
    });
  }

  function addA(t, delay=250) {
    return new Promise(resolve => {
      setTimeout(() => {
        const d = document.createElement('div');
        d.className = 'msg a';
        d.innerHTML = `<span class="bubble">${t}</span>`;
        messagesDiv.appendChild(d);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        resolve();
      }, delay);
    });
  }

  function shake(i=6, dur=120) {
    container.style.transition = 'transform 0.05s linear';
    let s = Date.now();
    const si = setInterval(() => {
      if(Date.now()-s >= dur) {
        container.style.transform = 'translate(0,0)';
        clearInterval(si);
        setTimeout(() => container.style.transition = '', 30);
        return;
      }
      container.style.transform = `translate(${(Math.random()-0.5)*i}px, ${(Math.random()-0.5)*i}px)`;
    }, 16);
  }

  function startShake() { document.body.classList.add('shake-heavy'); }
  function stopShake() { document.body.classList.remove('shake-heavy'); }

  async function showRedMessage(text, delay=600) {
    await addQ(`<span style="color:#c22;">${text}</span>`, delay);
  }

  function clearChoices() { choicesDiv.innerHTML = ''; }

  async function showOptions(opts) {
    clearChoices();
    opts.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn' + (o.forced ? ' forced-btn' : '');
      btn.textContent = o.label;
      if (o.size) btn.style.fontSize = o.size;
      btn.onclick = async () => {
        if (isAnimating) return;
        isAnimating = true;
        if(o.trait) choiceLog.push(o.trait);
        await addA(o.label);

        if (o.trait === 'refuse_q4') {
          darkPunish();
          await showRedMessage('……你不应该这样拒绝我的。', 500);
          await showRedMessage('我问这个，是因为关心你。这都不明白吗？', 600);
          await showRedMessage('嗯……你全身上下哪处不是我的？我问问怎么了。', 700);
          await new Promise(r => setTimeout(r, 800));
          normalStyle();
        } else if (o.trait === 'no_door') {
          darkPunish();
          await showRedMessage('不会啊……', 600);
          await showRedMessage('没关系，我会等的。等到你改变主意为止。', 700);
          await new Promise(r => setTimeout(r, 600));
          normalStyle();
        } else if (o.trait === 'yes_door') {
          darkPunish();
          await showRedMessage('真的吗？……你说“会”？', 500);
          await showRedMessage('你答应了。我记住了。', 700);
          await new Promise(r => setTimeout(r, 600));
          normalStyle();
        } else if (o.trait === 'police') {
          darkPunish();
          await showRedMessage('报警？呵呵……', 500);
          await showRedMessage('你觉得警察比我更在乎你吗？', 700);
          await new Promise(r => setTimeout(r, 600));
          normalStyle();
        } else if (o.trait === 'resist') {
          darkPunish();
          await showRedMessage('“别想”？……你说这种话的时候，自己信吗？', 500);
          await showRedMessage('你已经想了。你现在满脑子都是我。', 700);
          await new Promise(r => setTimeout(r, 600));
          normalStyle();
        } else if (o.trait === 'quit') {
          darkPunish();
          startShake();
          await showRedMessage('不填了？', 500);
          await showRedMessage('你说不填就不填？你当我是谁？', 600);
          await showRedMessage('我这么认真地问你……你这么对我，公平吗？', 700);
          await showRedMessage('你走了我会难过的。你知道那是什么感觉吗？', 700);
          stopShake();
          await showRedMessage('……好了，刚才是不是吓到你了？', 600);
          await showRedMessage('抱歉，我只是有点在意你。我们继续吧？', 700);
          await new Promise(r => setTimeout(r, 600));
          normalStyle();
        } else if (o.trait === 'force_no') {
          await handleForceChoice();
        }

        if (o.trait === 'yes_end') {
          await ending();
          isAnimating = false;
          return;
        }

        if(o.next) {
          clearChoices();
          await o.next();
        }
        isAnimating = false;
      };
      choicesDiv.appendChild(btn);
    });
  }

  async function handleForceChoice() {
    forceRound++;

    const forceLines = [
      '你走不了。',
      '还没问完呢，别急着走。',
      '你越躲，我越想追。明白吗？',
      '好了……我不想弄成这样。最后一个，就一个。'
    ];
    const line = forceLines[Math.min(forceRound - 1, forceLines.length - 1)];

    darkPunish();
    await showRedMessage(line, 500);
    await new Promise(r => setTimeout(r, 600));

    const baseFontSize = 14;
    const basePaddingV = 12;
    const basePaddingH = 16;

    const scale = Math.max(0.2, 1 - forceRound * 0.2);
    const noFontSize = Math.max(8, baseFontSize * scale) + 'px';
    const noPadV = Math.max(2, basePaddingV * scale) + 'px';
    const noPadH = Math.max(4, basePaddingH * scale) + 'px';

    const yesScale = Math.min(2.2, 1 + forceRound * 0.15);
    const yesFontSize = Math.min(28, baseFontSize * yesScale) + 'px';
    const yesPadV = Math.min(22, basePaddingV * yesScale) + 'px';
    const yesPadH = Math.min(28, basePaddingH * yesScale) + 'px';

    if (forceRound >= 4) {
      clearChoices();
      const row = document.createElement('div');
      row.className = 'force-row';
      const yesBtn = document.createElement('button');
      yesBtn.className = 'force-btn force-btn-yes';
      yesBtn.textContent = '愿意';
      yesBtn.style.fontSize = yesFontSize;
      yesBtn.style.padding = `${yesPadV} ${yesPadH}`;
      yesBtn.onclick = async () => {
        await addA('愿意');
        await ending();
      };
      row.appendChild(yesBtn);
      choicesDiv.appendChild(row);
    } else {
      clearChoices();
      const row = document.createElement('div');
      row.className = 'force-row';

      const noBtn = document.createElement('button');
      noBtn.className = 'force-btn force-btn-no';
      noBtn.textContent = '不愿意';
      noBtn.style.fontSize = noFontSize;
      noBtn.style.padding = `${noPadV} ${noPadH}`;
      noBtn.onclick = async () => {
        await addA('不愿意');
        await handleForceChoice();
      };

      const yesBtn = document.createElement('button');
      yesBtn.className = 'force-btn force-btn-yes';
      yesBtn.textContent = '愿意';
      yesBtn.style.fontSize = yesFontSize;
      yesBtn.style.padding = `${yesPadV} ${yesPadH}`;
      yesBtn.onclick = async () => {
        await addA('愿意');
        await ending();
      };

      row.appendChild(noBtn);
      row.appendChild(yesBtn);
      choicesDiv.appendChild(row);
    }
  }

  // ========== 问题链 ==========
  async function q1() {
    normalStyle();
    await addQ('您好，这是一份关于生活习惯的匿名调查。请问您每天的睡眠时长大约是多少？');
    await showOptions([
      { label:'A. 少于5小时', trait:'s_low', next:q2 },
      { label:'B. 5-7小时', trait:'s_mid', next:q2 },
      { label:'C. 7-9小时', trait:'s_high', next:q2 },
      { label:'D. 说不准', trait:'s_var', next:q2 }
    ]);
  }

  async function q2() {
    normalStyle();
    await addQ('您更喜欢哪种居住环境？');
    await showOptions([
      { label:'A. 热闹的市区', trait:'city', next:q3 },
      { label:'B. 安静的郊区', trait:'suburb', next:q3 },
      { label:'C. 偏远独处', trait:'alone', next:q3 },
      { label:'D. 无所谓', trait:'any', next:q3 }
    ]);
  }

  async function q3() {
    normalStyle();
    await addQ('您认为自己在人际关系中更倾向于？');
    await showOptions([
      { label:'A. 主动付出', trait:'give', next:q4 },
      { label:'B. 接受照顾', trait:'take', next:q4 },
      { label:'C. 保持距离', trait:'dist', next:q4 },
      { label:'D. 看对象是谁', trait:'dep', next:q4 }
    ]);
  }

  async function q4() {
    normalStyle();
    await addQ('你睡觉的时候最里面穿什么？' + maskSensitive('内裤还是什么都不穿？'));
    await showOptions([
      { label:'A. 睡衣', trait:'pj', next:q5 },
      { label:'B. 背心/吊带', trait:'tank', next:q5 },
      { label:'C. 不穿', trait:'naked', next:q5 },
      { label:'D. 关你什么事', trait:'refuse_q4', next:q5 }
    ]);
  }

  async function q5() {
    normalStyle();
    await addQ('你身上最' + maskSensitive('敏感') + '的地方在哪？耳后、' + maskSensitive('腰') + '侧、还是大' + maskSensitive('腿') + '内侧？');
    await showOptions([
      { label:'A. 耳后', trait:'ear', next:q6 },
      { label:'B. 腰侧', trait:'waist', next:q6 },
      { label:'C. 大腿内侧', trait:'thigh', next:q6 },
      { label:'D. ……你在说什么', trait:'q5_d', next:q6 }
    ]);
  }

  async function q6() {
    normalStyle();
    await addQ('那你最喜欢被人' + maskSensitive('碰') + '哪里？……轻轻地碰的那种。');
    await showOptions([
      { label:'A. 脖子', trait:'neck', next:q7 },
      { label:'B. 胸口', trait:'chest', next:q7 },
      { label:'C. 都不喜欢', trait:'none_like', next:q7 },
      { label:'D. 。', trait:'q6_d', next:q7 }
    ]);
  }

  async function q7() {
    normalStyle();
    await addQ('我现在出现在你门口，你会开吗？');
    await showOptions([
      { label:'A. 不会', trait:'no_door', next:q8 },
      { label:'B. 会', trait:'yes_door', next:q8 },
      { label:'C. 报警', trait:'police', next:q8 },
      { label:'D. 别想', trait:'resist', next:q8 },
      { label:'E. 不填了', trait:'quit', next:q8 }
    ]);
  }

  async function q8() {
    normalStyle();
    await addQ('喜欢过谁吗？哪怕一点点。');
    await showOptions([
      { label:'A. 有过', trait:'had', next:q9 },
      { label:'B. 没有', trait:'no_crush', next:q9 },
      { label:'C. 不知道', trait:'dunno', next:q9 },
      { label:'D. 现在只有你', trait:'only_u', next:q9 }
    ]);
  }

  async function q9() {
    normalStyle();
    // 如果选了“现在只有你”，先抓住这个话柄
    if (choiceLog.includes('only_u')) {
      await addQ('你刚才说……现在只有我？', 400);
      await addQ('再说一遍，我想听你再说一遍。', 400);
    }
    await addQ('<strong>你喜欢谁？</strong> 只能从下面选哦~');
    await showOptions([
      { label:'你', trait:'u1', next:q10 },
      { label:'你', trait:'u2', next:q10 },
      { label:'你', trait:'u3', next:q10 },
      { label:'你', trait:'u4', next:q10 }
    ]);
  }

  async function q10() {
    normalStyle();
    await addQ('啊~我就知道，我就知道你喜欢的人是我~', 500);
    await addQ('……也只能是我。', 500);
    await addQ('呵呵呵呵……', 500);
    await showOptions([
      { label:'不愿意', trait:'force_no' },
      { label:'不愿意', trait:'force_no' },
      { label:'不愿意', trait:'force_no' },
      { label:'……可以', trait:'yes_end' },
      { label:'不愿意', trait:'force_no' }
    ]);
  }

  async function ending() {
    normalStyle();
    await addQ('好啦，问卷到此结束。谢谢你这么配合。', 400);
    await addQ(`<span style="color:#222;">啊，祝您生活愉快~</span>`, 500);
    await addQ(`<span style="font-size:12px;color:#999;">……我会再去找你的。</span>`, 800);
    clearChoices();
    restartBtn.style.display = 'block';
  }

  async function restart() {
    messagesDiv.innerHTML = ''; clearChoices();
    restartBtn.style.display = 'none';
    choiceLog = []; refuseStreak = 0; forceRound = 0;
    normalStyle();
    await addQ('您好，这是一份关于生活习惯的匿名调查。', 200);
    await q1();
  }

  window.onload = async () => {
    await q1();
    restartBtn.onclick = restart;
  };
</script>
</body>
</html>
